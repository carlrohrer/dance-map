<!doctype html>
<html lang="en">
<head>

<body>
  <div class="card">
    <aside class="legend">
      <strong>Legend</strong>
      <div class="filters" id="filterControls">
        <button class="filter-btn active" type="button" data-filter="all">All Venues</button>
        <button class="filter-btn" type="button" data-filter="danceFocusedLarger"><span style="color:#2563eb;">●</span> Dance-focused, Larger Venues</button>
        <button class="filter-btn" type="button" data-filter="offersClasses"><span style="color:#16a34a;">●</span> Offers Classes</button>
        <button class="filter-btn" type="button" data-filter="predominantlyCountry"><span style="color:#dc2626;">●</span> Predominantly Country</button>
        <button class="filter-btn" type="button" data-filter="predominantlySwingBlues"><span style="color:#7c3aed;">●</span> Predominantly Swing or Blues</button>
        <button class="filter-btn" type="button" data-filter="predominantlyLatin"><span style="color:#f59e0b;">●</span> Predominantly Latin</button>
        <button class="filter-btn" type="button" data-filter="barsSmallerFloors"><span style="color:#0f766e;">●</span> Bars with Dance Floors</button>
      </div>
    </aside>

    <div class="map-container">
      <div id="jsMap"></div>
    </div>

  </div>

  <script>
    function initMap() {
      const defaultCenter = { lat: 39.758984479667205, lng: -105.01245697994544 };
      const categoryLabels = {
        danceFocusedLarger: "Dance-focused, Larger Venues",
        offersClasses: "Offers Classes",
        predominantlyCountry: "Predominantly Country",
        predominantlySwingBlues: "Predominantly Swing or Blues",
        predominantlyLatin: "Predominantly Latin",
        barsSmallerFloors: "Bars with Dance Floors"
      };

      const markerColors = {
        danceFocusedLarger: "#2563eb",
        offersClasses: "#16a34a",
        predominantlyCountry: "#dc2626",
        predominantlySwingBlues: "#7c3aed",
        predominantlyLatin: "#f59e0b",
        barsSmallerFloors: "#0f766e"
      };

      const dancePoints = [
        { title: "Main Dance Venue", lat: 39.758984, lng: -105.012457, type: "danceFocusedLarger" },
        { title: "Beginner Class Location", lat: 39.7468, lng: -104.995, type: "offersClasses" },
        { title: "Country Night Spot", lat: 39.7721, lng: -105.0218, type: "predominantlyCountry" },
        { title: "Swing/Blues Venue", lat: 39.7355, lng: -104.9875, type: "predominantlySwingBlues" },
        { title: "Latin Social Club", lat: 39.7494, lng: -105.0015, type: "predominantlyLatin" },
        { title: "Neighborhood Bar Dance Floor", lat: 39.7642, lng: -104.9992, type: "barsSmallerFloors" }
      ];

      const map = new google.maps.Map(document.getElementById("jsMap"), {
        center: defaultCenter,
        zoom: 11,
        mapTypeControl: true,
        streetViewControl: false,
        fullscreenControl: true
      });

      const infoWindow = new google.maps.InfoWindow();
      const markersByType = Object.keys(markerColors).reduce((acc, key) => {
        acc[key] = [];
        return acc;
      }, {});

      dancePoints.forEach((point) => {
        const marker = new google.maps.Marker({
          position: { lat: point.lat, lng: point.lng },
          map,
          title: point.title,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: markerColors[point.type],
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 1,
            scale: 8
          }
        });

        if (markersByType[point.type]) {
          markersByType[point.type].push(marker);
        }

        marker.addListener("click", () => {
          const destination = `${point.lat},${point.lng}`;
          const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destination)}`;
          infoWindow.setContent(
            `<div style="font-size:14px;line-height:1.4;">
              <strong>${point.title}</strong><br/>
              Type: ${categoryLabels[point.type] || point.type}<br/>
              <a href="${directionsUrl}" target="_blank" rel="noopener noreferrer">Navigate in Google Maps</a>
            </div>`
          );
          infoWindow.open({
            map,
            anchor: marker
          });
        });
      });

      const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
      const allButton = filterButtons.find((btn) => btn.getAttribute("data-filter") === "all");
      const subButtons = filterButtons.filter((btn) => btn.getAttribute("data-filter") !== "all");

      function applyButtonFilterState() {
        const isAllActive = allButton.classList.contains("active");

        if (isAllActive) {
          Object.keys(markersByType).forEach((group) => {
            markersByType[group].forEach((marker) => marker.setVisible(true));
          });
          return;
        }

        const selectedGroups = subButtons
          .filter((btn) => btn.classList.contains("active"))
          .map((btn) => btn.getAttribute("data-filter"));

        Object.keys(markersByType).forEach((group) => {
          const shouldShow = selectedGroups.includes(group);
          markersByType[group].forEach((marker) => marker.setVisible(shouldShow));
        });
      }

      allButton.addEventListener("click", () => {
        allButton.classList.add("active");
        subButtons.forEach((btn) => btn.classList.remove("active"));
        applyButtonFilterState();
      });

      subButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          allButton.classList.remove("active");
          btn.classList.toggle("active");

          const anySubActive = subButtons.some((subBtn) => subBtn.classList.contains("active"));
          if (!anySubActive) {
            allButton.classList.add("active");
          }

          applyButtonFilterState();
        });
      });

      applyButtonFilterState();
    }
  </script>
